name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./"
          severity: warning

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: relay/package-lock.json
      - name: Install relay dependencies
        working-directory: relay
        run: npm ci
      - name: Check JavaScript syntax
        run: |
          node --check relay/server.js
          node --check relay/ingest.js
          node --check extension/background.js
          node --check extension/content.js
      - name: Validate extension manifest
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"
      - name: Run relay tests
        working-directory: relay
        run: node --test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha

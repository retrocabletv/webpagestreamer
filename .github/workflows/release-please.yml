name: release-please

on:
  push:
    branches: [main]
  schedule:
    # Daily safety net: Dependabot auto-merges via GITHUB_TOKEN don't trigger
    # downstream workflows, so schedule a catch-up run to pick up merged bumps.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CIBOT_APP_ID }}
          private-key: ${{ secrets.CIBOT_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

services:
  webpagestreamer:
    build: .
    environment:
      - URL=https://www.google.com
      - OUTPUT=udp://239.0.0.1:1234
      - PROFILE=pal                # pal | ntsc | 720p | 1080p | hls
      # - WIDTH=720                # Override profile resolution
      # - HEIGHT=576
      # - FRAMERATE=25
      # IPTV integration (XMLTV guide, M3U playlist, health check)
      - CHANNEL_NAME=WebPageStreamer
      - CHANNEL_ID=webpagestreamer.1
      - PROGRAMME_TITLE=Live Stream
      # - PROGRAMME_DESC=
      # - STREAM_URL=              # Override auto-derived stream URL in playlist
    ports:
      - "9000:9000"               # HTTP + WebSocket (guide.xml, playlist.m3u, health)
      # - "9876:9876"             # Uncomment for TCP stream output
    # Uncomment for host networking (needed for UDP multicast in some setups):
    # network_mode: host

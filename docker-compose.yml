services:
  webpagestreamer:
    build: .
    environment:
      - URL=https://www.google.com
      - OUTPUT=udp://239.0.0.1:1234?pkt_size=1316
      - WIDTH=720
      - HEIGHT=576
      - FRAMERATE=25
    # Uncomment for TCP output and expose the port:
    # ports:
    #   - "9876:9876"
    # Uncomment for host networking (needed for UDP multicast in some setups):
    # network_mode: host
